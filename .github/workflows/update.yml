name: Update DGPT Data

on:
  schedule:
    # 9am, 2pm, 10pm ET daily
    - cron: '0 13 * * *'
    - cron: '0 18 * * *'
    - cron: '0 2 * * *'
    # Every 30 min Thu–Sun during tournaments
    - cron: '*/30 12-23 * * 4,5,6,0'
    # Monday 9am ET — open draft window
    - cron: '0 13 * * 1'
    # Wednesday 11pm ET — close draft window + resolve
    - cron: '0 3 * * 4'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch all data
        run: node scripts/fetch.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "dgpt-bot"
          git config user.email "bot@dgpt-pickem"
          git add data/
          git commit -m "Auto-update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: No changes
        if: steps.changes.outputs.changed != 'true'
        run: echo "No changes detected."
