<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DGPT Pick'em</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--orange:#E8541A;--orange-dim:rgba(232,84,26,0.15);--orange-border:rgba(232,84,26,0.25);--navy:#0a0d1a;--navy2:#111425;--navy3:#181d32;--card:#1e2338;--card2:#242840;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);--text:#eeecea;--muted:#7a7f9a;--green:#34d068;--green-dim:rgba(52,208,104,0.12);--green-border:rgba(52,208,104,0.25);--red:#f04545;--red-dim:rgba(240,69,69,0.12);--gold:#f0c040;--gold-dim:rgba(240,192,64,0.12);--leo:#34d068;--joe:#E8541A;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--navy);overflow:hidden;}
body{font-family:'Barlow',sans-serif;color:var(--text);max-width:430px;margin:0 auto;display:flex;flex-direction:column;}
.app-wrap{display:flex;flex-direction:column;height:100vh;}
.main-scroll{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding:0 0 72px;}
.main-scroll::-webkit-scrollbar{display:none;}
.header{background:var(--navy2);border-bottom:1px solid var(--border);padding:14px 16px 0;position:sticky;top:0;z-index:50;flex-shrink:0;}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.logo{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;letter-spacing:1px;text-transform:uppercase;}
.logo span{color:var(--orange);}
.user-chip{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:5px 12px 5px 8px;cursor:pointer;}
.user-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;}
.user-avatar.leo{background:var(--green-dim);color:var(--leo);}
.user-avatar.joe{background:var(--orange-dim);color:var(--joe);}
.user-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
.nav-tabs{display:flex;}
.nav-tab{flex:1;text-align:center;padding:10px 2px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;letter-spacing:0.5px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;text-transform:uppercase;white-space:nowrap;}
.nav-tab.active{color:var(--orange);border-bottom-color:var(--orange);}
.view{display:none;padding:16px;}
.view.active{display:block;}

/* LOGIN */
.login-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;background:var(--navy);}
.login-logo{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.login-logo span{color:var(--orange);}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:40px;}
.login-label{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:12px;}
.pin-display{display:flex;gap:10px;margin-bottom:28px;}
.pin-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);transition:all 0.15s;}
.pin-dot.filled{background:var(--orange);border-color:var(--orange);}
.pin-error .pin-dot.filled{background:var(--red);border-color:var(--red);}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:240px;}
.key{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;text-align:center;cursor:pointer;transition:all 0.1s;color:var(--text);user-select:none;}
.key:active{background:var(--card2);transform:scale(0.95);}
.key.del{font-size:18px;color:var(--muted);}
.key.empty{background:transparent;border-color:transparent;cursor:default;}
.login-error{font-size:13px;color:var(--red);margin-top:16px;min-height:20px;text-align:center;}
.login-switch{font-size:12px;color:var(--muted);margin-top:24px;text-align:center;}
.login-switch span{color:var(--orange);cursor:pointer;text-decoration:underline;}

/* SHARED */
.section-label{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:12px;}
.btn{background:var(--orange);color:white;border:none;border-radius:8px;padding:10px 20px;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;cursor:pointer;width:100%;transition:all 0.15s;}
.btn:active{transform:scale(0.98);opacity:0.9;}
.btn:disabled{opacity:0.4;cursor:not-allowed;}
.btn.secondary{background:transparent;border:1px solid var(--border2);color:var(--text);}
.btn.green{background:var(--green);color:#0a1a0f;}
.pick-chip{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;text-transform:uppercase;letter-spacing:0.5px;}
.pick-chip.leo{background:var(--green-dim);color:var(--leo);}
.pick-chip.joe{background:var(--orange-dim);color:var(--joe);}
.pick-chip.neutral{background:rgba(255,255,255,0.06);color:var(--muted);}

/* RESULTS */
.live-event-card{background:var(--navy3);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px;}
.live-card-top{padding:14px 16px 12px;border-bottom:1px solid var(--border);}
.live-top-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.live-event-name{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;text-transform:uppercase;letter-spacing:0.3px;line-height:1.1;}
.live-badge{display:flex;align-items:center;gap:5px;background:var(--red-dim);border:1px solid rgba(240,69,69,0.3);color:var(--red);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;flex-shrink:0;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--red);animation:pulse 1.2s infinite;}
.countdown-badge{background:var(--orange-dim);border:1px solid var(--orange-border);color:var(--orange);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:1px;text-transform:uppercase;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.3;}}
.live-event-sub{font-size:12px;color:var(--muted);}
.live-round-row{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;}
.live-round-row::-webkit-scrollbar{display:none;}
.round-chip{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;border:1px solid var(--border);color:var(--muted);white-space:nowrap;flex-shrink:0;background:transparent;}
.round-chip.active{background:var(--orange);border-color:var(--orange);color:white;}
.countdown-digits{display:flex;justify-content:center;gap:8px;padding:16px 16px 12px;}
.cd-unit{display:flex;flex-direction:column;align-items:center;gap:3px;}
.cd-num{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:900;line-height:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 12px;min-width:58px;text-align:center;}
.cd-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.cd-sep{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;color:var(--muted);margin-top:6px;}
.week-pts-row{display:flex;justify-content:center;gap:8px;padding:0 16px 14px;flex-wrap:wrap;}
.pick-summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.pick-summary-card{border-radius:10px;padding:10px 12px;border:1px solid var(--border);}
.pick-summary-card.leo{background:rgba(52,208,104,0.06);border-color:var(--green-border);}
.pick-summary-card.joe{background:rgba(232,84,26,0.06);border-color:var(--orange-border);}
.psc-title{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.psc-title.leo{color:var(--leo);}
.psc-title.joe{color:var(--joe);}
.psc-player{font-size:12px;font-weight:500;display:flex;justify-content:space-between;align-items:center;padding:3px 0;}
.pos-tag{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;}
.pos-tag.lead{color:var(--gold);}
.pos-tag.good{color:var(--green);}
.pos-tag.mid{color:var(--muted);}
.pos-tag.out{color:var(--red);}
.legend{display:flex;gap:14px;margin-bottom:10px;}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
.leg-bar{width:12px;height:12px;border-radius:2px;}
.leg-bar.leo{background:rgba(52,208,104,0.25);border-left:3px solid var(--leo);}
.leg-bar.joe{background:rgba(232,84,26,0.25);border-left:3px solid var(--joe);}
.leaderboard{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:14px;}
.lb-header{display:flex;padding:6px 14px 6px 46px;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.02);}
.lb-header span{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.lb-header span:first-child{flex:1;}
.lb-header span:last-child{min-width:40px;text-align:right;}
.lb-row{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);transition:background 0.15s;}
.lb-row:last-child{border-bottom:none;}
.lb-row.leo-pick{background:rgba(52,208,104,0.06);border-left:3px solid var(--leo);}
.lb-row.joe-pick{background:rgba(232,84,26,0.06);border-left:3px solid var(--joe);}
.lb-row:not(.leo-pick):not(.joe-pick){border-left:3px solid transparent;}
.lb-rank{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;min-width:22px;color:var(--muted);}
.lb-rank.top{color:var(--gold);}
.lb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.lb-dot.leo{background:var(--leo);}
.lb-dot.joe{background:var(--joe);}
.lb-dot.none{background:transparent;}
.lb-name{flex:1;font-size:13px;font-weight:500;}
.lb-thru{font-size:11px;color:var(--muted);min-width:28px;text-align:center;}
.lb-score{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;min-width:40px;text-align:right;}
.lb-score.under{color:var(--green);}
.lb-score.even{color:var(--muted);}
.lb-score.over{color:var(--red);}
.prev-event-hdr{background:var(--card2);border:1px solid var(--border);border-radius:10px 10px 0 0;padding:12px 14px;border-bottom:none;}
.prev-event-hdr-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;text-transform:uppercase;}
.prev-event-hdr-date{font-size:11px;color:var(--muted);}
.winner-banner{background:var(--gold-dim);border:1px solid rgba(240,192,64,0.2);border-top:none;padding:8px 14px;display:flex;align-items:center;gap:8px;font-size:12px;}
.winner-name{font-weight:600;color:var(--gold);}
.winner-tag{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:auto;}
.winner-tag.leo{background:var(--green-dim);color:var(--leo);}
.winner-tag.joe{background:var(--orange-dim);color:var(--joe);}
.winner-tag.push{background:rgba(255,255,255,0.06);color:var(--muted);}
.prev-lb{border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;overflow:hidden;margin-bottom:14px;}

/* SEASON */
.score-banner{background:var(--navy3);border:1px solid var(--border);border-radius:12px;padding:20px 16px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px;}
.player-score{flex:1;text-align:center;}
.score-name{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;}
.score-num{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:900;line-height:1;}
.score-num.leo{color:var(--leo);}
.score-num.joe{color:var(--joe);}
.score-pts{font-size:11px;color:var(--muted);margin-top:2px;}
.vs-div{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--muted);}
.rollover-pill{background:var(--orange-dim);border:1px solid var(--orange-border);color:var(--orange);font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;padding:7px 14px;border-radius:20px;text-align:center;margin-bottom:14px;letter-spacing:0.5px;}
.week-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.wc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.wc-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px;}
.wc-pts{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;}
.wc-pts.leo{background:var(--green-dim);color:var(--leo);}
.wc-pts.joe{background:var(--orange-dim);color:var(--joe);}
.wc-pts.push{background:rgba(255,255,255,0.06);color:var(--muted);}
.wc-detail{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.winner-pill{background:var(--gold-dim);color:var(--gold);font-size:11px;font-weight:600;padding:2px 7px;border-radius:8px;}
.banned-pill{background:var(--red-dim);color:var(--red);font-size:11px;font-weight:600;padding:2px 7px;border-radius:8px;}

/* DRAFT */
.draft-event-card{background:var(--navy3);border:1px solid var(--border);border-radius:12px;padding:14px 16px;margin-bottom:14px;}
.dec-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;text-transform:uppercase;letter-spacing:0.3px;margin-bottom:2px;}
.dec-date{font-size:12px;color:var(--muted);margin-bottom:10px;}
.dec-order{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding-top:10px;border-top:1px solid var(--border);}
.dec-order-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.roster-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.roster-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;}
.rc-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.rc-title.leo{color:var(--leo);}
.rc-title.joe{color:var(--joe);}
.rc-player{font-size:12px;font-weight:500;padding:5px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.rc-player:last-child{border-bottom:none;}
.rc-num{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--muted);min-width:14px;}
.rc-forced{font-size:11px;color:var(--muted);font-style:italic;}
.draft-cta{border-radius:10px;padding:14px;margin-bottom:14px;border:1px solid;}
.draft-cta.open{background:var(--orange-dim);border-color:var(--orange-border);}
.draft-cta.submitted{background:var(--green-dim);border-color:var(--green-border);}
.draft-cta-title{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.draft-cta.open .draft-cta-title{color:var(--orange);}
.draft-cta.submitted .draft-cta-title{color:var(--green);}
.draft-cta-sub{font-size:12px;color:var(--muted);margin-bottom:10px;}
.draft-closed{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;margin-bottom:14px;}
.draft-closed-label{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;}
.draft-closed-sub{font-size:12px;color:var(--muted);}

/* DRAFT SUBMISSION */
.ds-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.ds-back{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px 12px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;cursor:pointer;color:var(--text);}
.ds-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;text-transform:uppercase;}
.ds-section-title{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;}
.ds-section-sub{font-size:12px;color:var(--muted);margin-bottom:12px;line-height:1.5;}
.player-pool{display:flex;flex-direction:column;gap:6px;}
.pool-player{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all 0.15s;}
.pool-player.banned{opacity:0.35;cursor:not-allowed;}
.pp-rank{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;width:28px;text-align:center;color:var(--muted);}
.pp-rank.leo-r{color:var(--green);}
.pp-rank.joe-r{color:var(--orange);}
.pp-name{flex:1;font-size:13px;font-weight:500;}
.pp-pts{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--muted);}
.pp-banned{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--red);background:var(--red-dim);padding:2px 6px;border-radius:6px;}
.top10-tag{background:var(--gold-dim);color:var(--gold);font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;}
.ranked-list{display:flex;flex-direction:column;gap:6px;}
.ranked-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 12px;display:flex;align-items:center;gap:10px;}
.ri-rank{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;width:24px;}
.ri-rank.leo-r{color:var(--green);}
.ri-rank.joe-r{color:var(--orange);}
.ri-name{flex:1;font-size:13px;font-weight:500;}
.ri-remove{font-size:16px;color:var(--muted);cursor:pointer;padding:2px 8px;}
.progress-bar-wrap{background:var(--card);border-radius:4px;height:4px;margin-bottom:14px;overflow:hidden;}
.progress-bar{height:100%;border-radius:4px;transition:width 0.3s;}
.progress-bar.leo-p{background:var(--green);}
.progress-bar.joe-p{background:var(--orange);}
.submit-footer{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--navy2);border-top:1px solid var(--border);padding:12px 16px 20px;display:flex;gap:10px;z-index:60;}

/* STANDINGS */
.st-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);}
.st-row:last-child{border-bottom:none;}
.st-rank{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;color:var(--muted);min-width:26px;}
.st-rank.top{color:var(--gold);}
.st-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;flex-shrink:0;}
.st-info{flex:1;}
.st-name{font-size:14px;font-weight:600;display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.st-sub{font-size:11px;color:var(--muted);}
.st-pts{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;}
.banned-tag{background:var(--red-dim);color:var(--red);font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;font-family:'Barlow Condensed',sans-serif;}

/* RULES */
.rules-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:10px;}
.rules-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;}
.rules-body{font-size:13px;color:var(--muted);line-height:1.7;}
.rules-body strong{color:var(--text);}

/* SUCCESS */
.success-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:32px 24px;}
.success-icon{font-size:56px;margin-bottom:16px;}
.success-title{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.success-sub{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.6;}

/* BOTTOM NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--navy2);border-top:1px solid var(--border);display:flex;padding:8px 0 14px;z-index:50;}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;}
.bnav-icon{font-size:16px;color:var(--muted);transition:color 0.2s;}
.bnav-label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;transition:color 0.2s;}
.bnav-item.active .bnav-icon,.bnav-item.active .bnav-label{color:var(--orange);}

/* LOADING */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-wrap">
  <div class="login-logo">DGPT <span>Pick'em</span></div>
  <div class="login-sub">Leo vs Joe · 2026 Season</div>
  <div class="login-label" id="login-who-label">Enter Leo's PIN</div>
  <div class="pin-display" id="pin-display">
    <div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div>
  </div>
  <div class="keypad">
    <div class="key" onclick="pinKey('1')">1</div><div class="key" onclick="pinKey('2')">2</div><div class="key" onclick="pinKey('3')">3</div>
    <div class="key" onclick="pinKey('4')">4</div><div class="key" onclick="pinKey('5')">5</div><div class="key" onclick="pinKey('6')">6</div>
    <div class="key" onclick="pinKey('7')">7</div><div class="key" onclick="pinKey('8')">8</div><div class="key" onclick="pinKey('9')">9</div>
    <div class="key empty"></div><div class="key" onclick="pinKey('0')">0</div><div class="key del" onclick="pinDel()">⌫</div>
  </div>
  <div class="login-error" id="login-error"></div>
  <div class="login-switch">Not Leo? <span onclick="switchUser()">Switch to Joe</span></div>
</div>

<!-- APP -->
<div id="app" style="display:none;" class="app-wrap">
  <div class="header">
    <div class="header-top">
      <div class="logo">DGPT <span>Pick'em</span></div>
      <div class="user-chip" onclick="logout()">
        <div class="user-avatar" id="user-avatar-chip">L</div>
        <div class="user-name" id="user-name-chip">Leo</div>
      </div>
    </div>
    <div class="nav-tabs">
      <div class="nav-tab active" onclick="switchTab('results')">Results</div>
      <div class="nav-tab" onclick="switchTab('season')">Season</div>
      <div class="nav-tab" onclick="switchTab('draft')">Draft</div>
      <div class="nav-tab" onclick="switchTab('standings')">Standings</div>
      <div class="nav-tab" onclick="switchTab('rules')">Rules</div>
    </div>
  </div>

  <div class="main-scroll" id="main-scroll">
    <div class="view active" id="view-results"><div class="loading">Loading results...</div></div>
    <div class="view" id="view-season"><div class="loading">Loading season...</div></div>
    <div class="view" id="view-draft"><div class="loading">Loading draft...</div></div>
    <div class="view" id="view-submit"><div style="padding:16px;" id="submit-content"></div></div>
    <div class="view" id="view-standings"><div class="loading">Loading standings...</div></div>
    <div class="view" id="view-rules"></div>
  </div>

  <div class="bottom-nav">
    <div class="bnav-item active" id="bnav-results" onclick="switchTab('results')"><div class="bnav-icon">📡</div><div class="bnav-label">Results</div></div>
    <div class="bnav-item" id="bnav-season" onclick="switchTab('season')"><div class="bnav-icon">🏆</div><div class="bnav-label">Season</div></div>
    <div class="bnav-item" id="bnav-draft" onclick="switchTab('draft')"><div class="bnav-icon">⬡</div><div class="bnav-label">Draft</div></div>
    <div class="bnav-item" id="bnav-standings" onclick="switchTab('standings')"><div class="bnav-icon">◈</div><div class="bnav-label">Standings</div></div>
    <div class="bnav-item" id="bnav-rules" onclick="switchTab('rules')"><div class="bnav-icon">◎</div><div class="bnav-label">Rules</div></div>
  </div>
</div>

<script>
// ══ CONFIG ══
const PINS = { leo: '0037', joe: '4242' };
const GAME = { banned: ['Gannon Buhr'], pts_per_week: 20, draft_picks: 8, forced_picks: 6 };

// ══ STATE ══
let currentUser = null;
let loginTarget = 'leo';
let pinBuffer = '';
let countdownTimer = null;
let data = { standings: null, schedule: null, picks: null, results: null };
let draft8 = [], forced6 = [], submitStep = 1;

// ══ DATA LOADING ══
async function loadData() {
  const files = ['standings','schedule','picks','results'];
  await Promise.all(files.map(async f => {
    try {
      const r = await fetch(`data/${f}.json?t=${Date.now()}`);
      if (r.ok) data[f] = await r.json();
    } catch(e) { console.warn(`Could not load ${f}.json`, e); }
  }));
}

// ══ LOGIN ══
function switchUser() {
  loginTarget = loginTarget === 'leo' ? 'joe' : 'leo';
  pinBuffer = ''; updatePinDisplay();
  document.getElementById('login-who-label').textContent = `Enter ${loginTarget === 'leo' ? "Leo's" : "Joe's"} PIN`;
  document.querySelector('.login-switch').innerHTML = loginTarget === 'leo'
    ? 'Not Leo? <span onclick="switchUser()">Switch to Joe</span>'
    : 'Not Joe? <span onclick="switchUser()">Switch to Leo</span>';
  document.getElementById('login-error').textContent = '';
}
function pinKey(k) {
  if(pinBuffer.length >= 4) return;
  pinBuffer += k; updatePinDisplay();
  if(pinBuffer.length === 4) setTimeout(checkPin, 120);
}
function pinDel() { pinBuffer = pinBuffer.slice(0,-1); updatePinDisplay(); }
function updatePinDisplay() {
  for(let i=0;i<4;i++) document.getElementById('pd'+i).classList.toggle('filled', i < pinBuffer.length);
}
function checkPin() {
  if(pinBuffer === PINS[loginTarget]) {
    currentUser = loginTarget;
    localStorage.setItem('dgpt_user', currentUser);
    showApp();
  } else {
    document.getElementById('pin-display').classList.add('pin-error');
    document.getElementById('login-error').textContent = 'Incorrect PIN. Try again.';
    setTimeout(()=>{ pinBuffer=''; updatePinDisplay(); document.getElementById('pin-display').classList.remove('pin-error'); document.getElementById('login-error').textContent=''; }, 900);
  }
}
function logout() {
  currentUser = null; localStorage.removeItem('dgpt_user');
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  pinBuffer=''; updatePinDisplay();
}
async function showApp() {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  const chip = document.getElementById('user-avatar-chip');
  chip.className = 'user-avatar ' + currentUser;
  chip.textContent = currentUser === 'leo' ? 'L' : 'J';
  document.getElementById('user-name-chip').textContent = currentUser === 'leo' ? 'Leo' : 'Joe';
  await loadData();
  renderResults(); renderSeason(); renderDraft(); renderStandings(); renderRules();
  switchTab('results');
}

// ══ TABS ══
function switchTab(tab) {
  ['results','season','draft','standings','rules'].forEach((t,i) => {
    document.querySelectorAll('.nav-tab')[i].classList.toggle('active', t===tab);
  });
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  document.querySelectorAll('.bnav-item').forEach(b=>b.classList.remove('active'));
  document.getElementById('bnav-'+tab)?.classList.add('active');
  document.getElementById('main-scroll').scrollTop = 0;
}

// ══ HELPERS ══
function getWeekPicks(weekNum) {
  const week = data.picks?.weeks?.find(w=>w.week===weekNum);
  return week || null;
}
function getCurrentWeek() {
  return data.picks?.weeks?.find(w=>w.status==='upcoming') || data.picks?.weeks?.slice(-1)[0];
}
function allPicksForWeek(weekNum) {
  const w = getWeekPicks(weekNum);
  if(!w) return { leo: [], joe: [] };
  return {
    leo: [...(w.leo?.resolved_picks||[]), w.leo?.forced_pick].filter(Boolean),
    joe: [...(w.joe?.resolved_picks||[]), w.joe?.forced_pick].filter(Boolean)
  };
}
function pickTeam(name, weekNum) {
  const p = allPicksForWeek(weekNum);
  if(p.leo.includes(name)) return 'leo';
  if(p.joe.includes(name)) return 'joe';
  return null;
}
function isBanned(name) { return GAME.banned.includes(name); }
function scoreClass(s) {
  if(!s || s==='E') return 'even';
  return s.startsWith('-') ? 'under' : 'over';
}
function posClass(rank) {
  if(rank===1||rank==='1') return 'lead';
  const r = parseInt(rank);
  if(r<=5) return 'good';
  if(r<=15) return 'mid';
  return 'out';
}
function nextEventStart() {
  const upcoming = data.schedule?.events?.find(e=>e.status==='upcoming');
  return upcoming ? new Date(upcoming.start+'T09:00:00-05:00') : null;
}

// ══ RESULTS ══
function renderResults() {
  const el = document.getElementById('view-results');
  const results = data.results;
  if(!results) { el.innerHTML = '<div class="loading">No data available</div>'; return; }
  if(results.live?.active) {
    el.innerHTML = renderLiveResults(results.live, results.previous);
  } else {
    el.innerHTML = renderCountdownBlock(results.previous);
    startCountdown();
  }
}
function renderCountdownBlock(prev) {
  const cw = getCurrentWeek();
  const firstPick = cw?.first_pick || 'leo';
  const pts = data.picks?.season_score;
  const rollover = data.picks?.season_score?.rollover || 0;
  const weekPts = GAME.pts_per_week + rollover;
  const upcoming = data.schedule?.events?.find(e=>e.status==='upcoming');
  return `
    <div class="live-event-card">
      <div class="live-card-top">
        <div class="live-top-row">
          <div class="live-event-name">${upcoming?.name || 'Next Event TBD'}</div>
          <div class="countdown-badge">Up Next</div>
        </div>
        <div class="live-event-sub">${upcoming ? formatDateRange(upcoming.start,upcoming.end)+' · '+upcoming.location : ''}</div>
      </div>
      <div class="countdown-digits">
        <div class="cd-unit"><div class="cd-num" id="cd-d">--</div><div class="cd-label">Days</div></div>
        <div class="cd-sep">:</div>
        <div class="cd-unit"><div class="cd-num" id="cd-h">--</div><div class="cd-label">Hrs</div></div>
        <div class="cd-sep">:</div>
        <div class="cd-unit"><div class="cd-num" id="cd-m">--</div><div class="cd-label">Min</div></div>
        <div class="cd-sep">:</div>
        <div class="cd-unit"><div class="cd-num" id="cd-s">--</div><div class="cd-label">Sec</div></div>
      </div>
      <div class="week-pts-row">
        <div class="pick-chip ${firstPick}">${firstPick==='leo'?'Leo':'Joe'} picks 1st · Wk ${cw?.week||'—'}</div>
        <div class="pick-chip neutral">${weekPts} pts on the line</div>
      </div>
    </div>
    <div class="section-label">Previous Week Results</div>
    ${prev ? renderPrevBlock(prev, cw?.week-1) : '<div class="loading" style="padding:20px">No previous results yet</div>'}
  `;
}
function renderLiveResults(live, prev) {
  const cw = getCurrentWeek();
  const leoP = allPicksForWeek(cw?.week);
  const roundChips = Array.from({length:live.total_rounds||3},(_,i)=>{
    const n=i+1;
    const isCur = n===live.current_round;
    const isDone = n<live.current_round;
    return `<div class="round-chip ${isCur?'active':''}">${isDone?'R'+n+' Final':isCur?'R'+n+' · '+(live.holes_complete?'Hole '+live.holes_complete:'In Progress'):'R'+n}</div>`;
  }).join('');
  const picks = { leo: leoP.leo, joe: leoP.joe };
  const summaryPlayers = {
    leo: live.leaderboard.filter(r=>picks.leo.includes(r.name)).slice(0,3),
    joe: live.leaderboard.filter(r=>picks.joe.includes(r.name)).slice(0,3)
  };
  const lb50 = live.leaderboard.slice(0,50);
  return `
    <div class="live-event-card">
      <div class="live-card-top">
        <div class="live-top-row">
          <div class="live-event-name">${live.event_name}</div>
          <div class="live-badge"><div class="live-dot"></div>Live</div>
        </div>
        <div class="live-event-sub">${live.location} · Round ${live.current_round} of ${live.total_rounds||3}</div>
      </div>
      <div class="live-round-row">${roundChips}</div>
    </div>
    <div class="pick-summary-grid">
      ${['leo','joe'].map(u=>`
        <div class="pick-summary-card ${u}">
          <div class="psc-title ${u}">${u==='leo'?'Leo':'Joe'}'s Picks</div>
          ${summaryPlayers[u].map(p=>`
            <div class="psc-player">
              <span>${p.name.split(' ').slice(-1)[0]}</span>
              <span class="pos-tag ${posClass(p.rank)}">${typeof p.rank==='number'?'#'+p.rank:p.rank}</span>
            </div>`).join('')}
          ${summaryPlayers[u].length===0?'<div style="font-size:11px;color:var(--muted)">No picks in top 50</div>':''}
        </div>`).join('')}
    </div>
    <div class="section-label">Live Leaderboard — Top 50</div>
    <div class="legend"><div class="legend-item"><div class="leg-bar leo"></div>Leo's pick</div><div class="legend-item"><div class="leg-bar joe"></div>Joe's pick</div></div>
    <div class="leaderboard">
      <div class="lb-header"><span>Player</span><span>Thru</span><span>Score</span></div>
      ${lb50.map(r=>{
        const team = picks.leo.includes(r.name)?'leo':picks.joe.includes(r.name)?'joe':null;
        return `<div class="lb-row ${team?team+'-pick':''}">
          <div class="lb-rank ${parseInt(r.rank)<=3?'top':''}">${r.rank}</div>
          <div class="lb-dot ${team||'none'}"></div>
          <div class="lb-name">${r.name}</div>
          <div class="lb-thru">${r.thru||'F'}</div>
          <div class="lb-score ${scoreClass(r.score)}">${r.score}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="section-label">Previous Week</div>
    ${prev ? renderPrevBlock(prev, cw?.week-1) : ''}
  `;
}
function renderPrevBlock(prev, weekNum) {
  const picks = allPicksForWeek(weekNum);
  const winnerTeam = prev.winner_team || (picks.leo.includes(prev.winner)?'leo':picks.joe.includes(prev.winner)?'joe':null);
  return `
    <div class="legend"><div class="legend-item"><div class="leg-bar leo"></div>Leo's pick</div><div class="legend-item"><div class="leg-bar joe"></div>Joe's pick</div></div>
    <div class="prev-event-hdr">
      <div class="prev-event-hdr-name">${prev.event_name}</div>
      <div class="prev-event-hdr-date">${prev.date||''} · ${prev.location||''}</div>
    </div>
    <div class="winner-banner">
      <span>🏆</span>
      <span>Winner: <span class="winner-name">${prev.winner}</span></span>
      ${winnerTeam ? `<div class="winner-tag ${winnerTeam}">${winnerTeam.toUpperCase()} +${GAME.pts_per_week}pts</div>` : '<div class="winner-tag push">PUSH</div>'}
    </div>
    <div class="prev-lb leaderboard">
      <div class="lb-header"><span>Player</span><span></span><span>Score</span></div>
      ${(prev.leaderboard||[]).slice(0,20).map(r=>{
        const team = picks.leo.includes(r.name)?'leo':picks.joe.includes(r.name)?'joe':null;
        return `<div class="lb-row ${team?team+'-pick':''}">
          <div class="lb-rank ${r.rank<=3?'top':''}">${r.rank}</div>
          <div class="lb-dot ${team||'none'}"></div>
          <div class="lb-name">${r.name}</div>
          <div class="lb-thru"></div>
          <div class="lb-score ${scoreClass(r.score)}">${r.score}</div>
        </div>`;
      }).join('')}
    </div>
  `;
}
function startCountdown() {
  if(countdownTimer) clearInterval(countdownTimer);
  const target = nextEventStart();
  if(!target) return;
  function tick() {
    const diff = Math.max(0, target - new Date());
    const d=document.getElementById('cd-d'),h=document.getElementById('cd-h'),m=document.getElementById('cd-m'),s=document.getElementById('cd-s');
    if(!d){clearInterval(countdownTimer);return;}
    d.textContent=String(Math.floor(diff/86400000)).padStart(2,'0');
    h.textContent=String(Math.floor(diff%86400000/3600000)).padStart(2,'0');
    m.textContent=String(Math.floor(diff%3600000/60000)).padStart(2,'0');
    s.textContent=String(Math.floor(diff%60000/1000)).padStart(2,'0');
  }
  tick(); countdownTimer=setInterval(tick,1000);
}

// ══ SEASON ══
function renderSeason() {
  const el = document.getElementById('view-season');
  const score = data.picks?.season_score || {leo:0,joe:0,rollover:0};
  const weeks = data.picks?.weeks || [];
  const cw = getCurrentWeek();
  const rollover = score.rollover || 0;
  const weekPts = GAME.pts_per_week + rollover;
  el.innerHTML = `
    <div class="score-banner">
      <div class="player-score">
        <div class="score-name">Joe</div>
        <div class="score-num joe">${score.joe}</div>
        <div class="score-pts">points</div>
      </div>
      <div class="vs-div">VS</div>
      <div class="player-score">
        <div class="score-name">Leo</div>
        <div class="score-num leo">${score.leo}</div>
        <div class="score-pts">points</div>
      </div>
    </div>
    <div class="rollover-pill">⚡ Week ${cw?.week||'—'} worth ${weekPts} pts${rollover>0?' — '+rollover+' pt rollover active':' — no rollover'}</div>
    <div class="section-label">Season History</div>
    ${weeks.filter(w=>w.status==='done'||w.result).map(w=>`
      <div class="week-card">
        <div class="wc-header">
          <div class="wc-title">Week ${w.week} — ${w.event}</div>
          <div class="wc-pts ${w.result||'push'}">${w.result==='push'?'PUSH':w.result==='leo'?'LEO +'+w.points_awarded:'JOE +'+w.points_awarded}</div>
        </div>
        <div class="wc-detail">
          ${w.winner?`<span class="winner-pill">🏆 ${w.winner}</span>`:'No winner among picks'}
          ${w.rolled_to?`· ${w.points_awarded||GAME.pts_per_week} pts rolled to Week ${w.rolled_to}`:''}
          ${w.winner==='Gannon Buhr'&&w.week===3?`<span class="banned-pill">Gannon banned after this</span>`:''}
        </div>
      </div>`).join('')}
  `;
}

// ══ DRAFT ══
function hasSubmitted(user) {
  const cw = getCurrentWeek();
  return cw?.[user]?.submitted || false;
}
function draftOpenDate(cw) { return cw?.draft_open ? new Date(cw.draft_open+'T00:00:00') : null; }
function draftCloseDate(cw) { return cw?.draft_close ? new Date(cw.draft_close+'T23:59:59') : null; }
function isDraftOpen() {
  const cw = getCurrentWeek();
  if(!cw?.draft_open||!cw?.draft_close) return false;
  const now = new Date();
  return now >= draftOpenDate(cw) && now <= draftCloseDate(cw);
}
function isDraftPending(cw) {
  const open = draftOpenDate(cw);
  return open && new Date() < open;
}
function renderDraftCountdown(targetDate, labelPrefix) {
  const diff = Math.max(0, targetDate - new Date());
  const d=Math.floor(diff/86400000), h=Math.floor(diff%86400000/3600000),
        m=Math.floor(diff%3600000/60000), s=Math.floor(diff%60000/1000);
  return `<div style="display:flex;gap:8px;align-items:center;justify-content:center;margin:10px 0;">
    ${[{v:d,l:'Days'},{v:h,l:'Hrs'},{v:m,l:'Min'},{v:s,l:'Sec'}].map((u,i)=>`
      ${i>0?'<div style="font-family:\'Barlow Condensed\',sans-serif;font-size:20px;font-weight:800;color:var(--muted);margin-bottom:14px;">:</div>':''}
      <div style="display:flex;flex-direction:column;align-items:center;gap:3px;">
        <div style="font-family:\'Barlow Condensed\',sans-serif;font-size:26px;font-weight:900;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:5px 10px;min-width:48px;text-align:center;" id="dcd-${u.l.toLowerCase()}">${String(u.v).padStart(2,'0')}</div>
        <div style="font-family:\'Barlow Condensed\',sans-serif;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;">${u.l}</div>
      </div>`).join('')}
  </div>`;
}
function startDraftCountdown(targetDate, ids) {
  if(countdownTimer) clearInterval(countdownTimer);
  function tick() {
    const diff = Math.max(0, targetDate - new Date());
    ids.forEach((id,i)=>{
      const el = document.getElementById(id);
      if(!el){clearInterval(countdownTimer);return;}
      const vals=[Math.floor(diff/86400000),Math.floor(diff%86400000/3600000),Math.floor(diff%3600000/60000),Math.floor(diff%60000/1000)];
      el.textContent = String(vals[i]).padStart(2,'0');
    });
    if(diff===0) { clearInterval(countdownTimer); renderDraft(); }
  }
  tick(); countdownTimer=setInterval(tick,1000);
}
function renderDraft() {
  const el = document.getElementById('view-draft');
  const cw = getCurrentWeek();
  if(!cw) { el.innerHTML = '<div class="loading">No upcoming events</div>'; return; }
  const open = isDraftOpen();
  const pending = isDraftPending(cw);
  const submitted = hasSubmitted(currentUser);
  const otherUser = currentUser==='leo'?'joe':'leo';
  const otherSubmitted = hasSubmitted(otherUser);
  const upcomingEvent = data.schedule?.events?.find(e=>e.week===cw.week);
  const leo = cw.leo?.resolved_picks||[];
  const joe = cw.joe?.resolved_picks||[];
  const leoForced = cw.leo?.forced_pick;
  const joeForced = cw.joe?.forced_pick;
  const firstPick = cw.first_pick||'joe';
  const openDate = draftOpenDate(cw);
  const closeDate = draftCloseDate(cw);

  // Build status block
  let statusBlock = '';
  if(submitted) {
    statusBlock = `<div class="draft-cta submitted">
      <div class="draft-cta-title">✓ Your Picks Are Locked</div>
      <div class="draft-cta-sub">${otherSubmitted?`Both players have submitted — rosters are set.`:`Waiting on ${otherUser==='leo'?'Leo':'Joe'} to submit their picks.`}</div>
      <button class="btn secondary" onclick="startSubmit()">Edit Picks</button>
    </div>`;
  } else if(open) {
    statusBlock = `<div class="draft-cta open">
      <div class="draft-cta-title">🟢 Draft Window Open</div>
      <div class="draft-cta-sub">Closes ${closeDate?closeDate.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})+' at midnight':''}</div>
      ${renderDraftCountdown(closeDate,'')}
      <button class="btn" onclick="startSubmit()">Submit My Picks →</button>
    </div>`;
  } else if(pending) {
    statusBlock = `<div class="draft-closed" style="text-align:center;">
      <div class="draft-closed-label" style="color:var(--gold);margin-bottom:4px;">⏳ Draft Opens Soon</div>
      <div class="draft-closed-sub" style="margin-bottom:10px;">Picks open ${openDate?openDate.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'}):''}</div>
      ${renderDraftCountdown(openDate,'')}
    </div>`;
  } else {
    statusBlock = `<div class="draft-closed">
      <div class="draft-closed-label">Draft Window Closed</div>
      <div class="draft-closed-sub">Opens Monday of tournament week · closes Wednesday at midnight</div>
    </div>`;
  }

  el.innerHTML = `
    <div class="draft-event-card">
      <div class="dec-name">${upcomingEvent?.name||cw.event}</div>
      <div class="dec-date">${upcomingEvent?formatDateRange(upcomingEvent.start,upcomingEvent.end)+' · '+upcomingEvent.location:''}</div>
      <div class="dec-order">
        <div class="dec-order-label">Week ${cw.week} order:</div>
        <div class="pick-chip ${firstPick}">${firstPick==='leo'?'Leo':'Joe'} 1st</div>
        <div class="pick-chip ${firstPick==='leo'?'joe':'leo'}">${firstPick==='leo'?'Joe':'Leo'} 2nd</div>
        <div class="pick-chip ${firstPick==='leo'?'joe':'leo'}">${firstPick==='leo'?'Joe':'Leo'} 3rd</div>
        <div class="pick-chip ${firstPick}">${firstPick==='leo'?'Leo':'Joe'} 4th</div>
        <div class="pick-chip neutral">+ Forced</div>
      </div>
    </div>
    ${statusBlock}
    <div class="section-label">Week ${cw.week} Rosters</div>
    ${leo.length||joe.length||leoForced||joeForced ? `
      <div class="roster-grid">
        <div class="roster-card">
          <div class="rc-title leo">Leo</div>
          ${leo.map((p,i)=>`<div class="rc-player"><span class="rc-num">P${i===0?1:4}</span>${p}</div>`).join('')}
          ${leoForced?`<div class="rc-player"><span class="rc-num" style="font-style:italic">F</span><span class="rc-forced">${leoForced}*</span></div>`:''}
          ${!leo.length&&!leoForced?'<div class="rc-forced" style="padding:8px 0;color:var(--muted);">Pending</div>':''}
        </div>
        <div class="roster-card">
          <div class="rc-title joe">Joe</div>
          ${joe.map((p,i)=>`<div class="rc-player"><span class="rc-num">P${i===0?2:3}</span>${p}</div>`).join('')}
          ${joeForced?`<div class="rc-player"><span class="rc-num" style="font-style:italic">F</span><span class="rc-forced">${joeForced}*</span></div>`:''}
          ${!joe.length&&!joeForced?'<div class="rc-forced" style="padding:8px 0;color:var(--muted);">Pending</div>':''}
        </div>
      </div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:14px;">* Forced picks assigned by opponent</div>` :
      `<div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;text-align:center;">
        <div style="font-size:13px;color:var(--muted);margin-bottom:4px;">No rosters yet</div>
        <div style="font-size:12px;color:var(--muted);">Submit your picks during the draft window — rosters resolve automatically.</div>
      </div>`}
  `;

  // Start live countdown if pending or open
  if(pending && openDate) {
    startDraftCountdown(openDate, ['dcd-days','dcd-hrs','dcd-min','dcd-sec']);
  } else if(open && closeDate) {
    startDraftCountdown(closeDate, ['dcd-days','dcd-hrs','dcd-min','dcd-sec']);
  }
}

// ══ DRAFT SUBMISSION ══
function startSubmit() {
  draft8=[]; forced6=[]; submitStep=1;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-submit').classList.add('active');
  renderSubmitStep();
}
function cancelSubmit() {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-draft').classList.add('active');
  renderDraft();
}
function renderSubmitStep() {
  const isLeo = currentUser==='leo';
  const rankClass = isLeo?'leo-r':'joe-r';
  const colorVar = isLeo?'var(--green)':'var(--orange)';
  const standings = data.standings?.standings || [];
  const eligible = standings.filter(p=>!isBanned(p.name));
  const top10 = eligible.slice(0,10);
  const el = document.getElementById('submit-content');
  document.getElementById('view-submit').classList.add('active');
  if(submitStep===1) {
    const remaining = eligible.filter(p=>!draft8.find(d=>d.name===p.name));
    const prog = (draft8.length/GAME.draft_picks)*100;
    el.innerHTML = `
      <div class="ds-header">
        <div class="ds-back" onclick="cancelSubmit()">← Back</div>
        <div class="ds-title" style="color:${colorVar}">Rank Your 8</div>
      </div>
      <div class="ds-section-title">Your Draft Rankings</div>
      <div class="ds-section-sub">Tap players in preference order. Your top available player gets drafted to your team in snake order. Gannon Buhr is permanently banned.</div>
      <div class="progress-bar-wrap"><div class="progress-bar ${rankClass}" style="width:${prog}%"></div></div>
      ${draft8.length>0?`<div class="ranked-list" style="margin-bottom:12px;">${draft8.map((p,i)=>`<div class="ranked-item"><div class="ri-rank ${rankClass}">${i+1}</div><div class="ri-name">${p.name}</div><div class="ri-remove" onclick="removeDraft8(${i})">✕</div></div>`).join('')}</div>`:''}
      ${draft8.length<GAME.draft_picks?`
        <div class="section-label" style="margin-bottom:8px;">Available Players</div>
        <div class="player-pool">
          ${remaining.map(p=>`
            <div class="pool-player ${isBanned(p.name)?'banned':''}" onclick="${isBanned(p.name)?'':'addDraft8(\''+p.name+'\')'}">
              <div class="pp-rank ${rankClass}">${draft8.length+1}</div>
              <div class="pp-name">${p.name}</div>
              ${isBanned(p.name)?`<div class="pp-banned">BANNED</div>`:`<div class="pp-pts">${p.pts?.toLocaleString()||''}</div>`}
            </div>`).join('')}
        </div>` : `<div style="text-align:center;padding:20px;color:var(--green);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;">✓ All ${GAME.draft_picks} ranked!</div>`}
      <div class="submit-footer">
        <button class="btn secondary" onclick="cancelSubmit()">Cancel</button>
        <button class="btn ${isLeo?'green':''}" onclick="nextStep()" ${draft8.length<GAME.draft_picks?'disabled':''}>Next →</button>
      </div>`;
  } else if(submitStep===2) {
    const remaining = top10.filter(p=>!forced6.find(d=>d.name===p.name));
    const prog = (forced6.length/GAME.forced_picks)*100;
    const other = currentUser==='leo'?'Joe':'Leo';
    el.innerHTML = `
      <div class="ds-header">
        <div class="ds-back" onclick="submitStep=1;renderSubmitStep()">← Back</div>
        <div class="ds-title" style="color:${colorVar}">Forced Picks</div>
      </div>
      <div class="ds-section-title">Assign 6 Players to ${other}</div>
      <div class="ds-section-sub">Rank 6 top-10 DGPT players to assign to ${other}'s roster. Their highest-ranked available player gets forced onto their team.</div>
      <div class="progress-bar-wrap"><div class="progress-bar ${rankClass}" style="width:${prog}%"></div></div>
      ${forced6.length>0?`<div class="ranked-list" style="margin-bottom:12px;">${forced6.map((p,i)=>`<div class="ranked-item"><div class="ri-rank ${rankClass}">${i+1}</div><div class="ri-name">${p.name}</div><div class="ri-remove" onclick="removeForced6(${i})">✕</div></div>`).join('')}</div>`:''}
      ${forced6.length<GAME.forced_picks?`
        <div class="section-label" style="margin-bottom:8px;">Top 10 DGPT Players</div>
        <div class="player-pool">
          ${remaining.map(p=>`
            <div class="pool-player" onclick="addForced6('${p.name}')">
              <div class="pp-rank ${rankClass}">${forced6.length+1}</div>
              <div class="pp-name">${p.name}</div>
              <div class="top10-tag">Top 10</div>
            </div>`).join('')}
        </div>` : `<div style="text-align:center;padding:20px;color:var(--green);font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;">✓ All ${GAME.forced_picks} ranked!</div>`}
      <div class="submit-footer">
        <button class="btn secondary" onclick="submitStep=1;renderSubmitStep()">← Back</button>
        <button class="btn ${isLeo?'green':''}" onclick="nextStep()" ${forced6.length<GAME.forced_picks?'disabled':''}>Review →</button>
      </div>`;
  } else if(submitStep===3) {
    const other = currentUser==='leo'?'Joe':'Leo';
    el.innerHTML = `
      <div class="ds-header">
        <div class="ds-back" onclick="submitStep=2;renderSubmitStep()">← Back</div>
        <div class="ds-title" style="color:${colorVar}">Confirm</div>
      </div>
      <div class="ds-section-title" style="margin-bottom:8px;">Your Draft Rankings</div>
      <div class="ranked-list" style="margin-bottom:18px;">${draft8.map((p,i)=>`<div class="ranked-item"><div class="ri-rank ${rankClass}">${i+1}</div><div class="ri-name">${p.name}</div></div>`).join('')}</div>
      <div class="ds-section-title" style="margin-bottom:8px;">Forced Picks for ${other}</div>
      <div class="ranked-list" style="margin-bottom:80px;">${forced6.map((p,i)=>`<div class="ranked-item"><div class="ri-rank ${currentUser==='leo'?'joe-r':'leo-r'}">${i+1}</div><div class="ri-name">${p.name}</div></div>`).join('')}</div>
      <div class="submit-footer">
        <button class="btn secondary" onclick="submitStep=2;renderSubmitStep()">← Edit</button>
        <button class="btn ${isLeo?'green':''}" onclick="confirmSubmit()">Lock In ✓</button>
      </div>`;
  }
  document.getElementById('main-scroll').scrollTop=0;
}
function addDraft8(name) {
  const p = data.standings?.standings?.find(x=>x.name===name);
  if(p&&draft8.length<GAME.draft_picks&&!draft8.find(x=>x.name===name)){draft8.push(p);renderSubmitStep();}
}
function removeDraft8(i){draft8.splice(i,1);renderSubmitStep();}
function addForced6(name) {
  const p = data.standings?.standings?.find(x=>x.name===name);
  if(p&&forced6.length<GAME.forced_picks&&!forced6.find(x=>x.name===name)){forced6.push(p);renderSubmitStep();}
}
function removeForced6(i){forced6.splice(i,1);renderSubmitStep();}
function nextStep(){submitStep++;renderSubmitStep();}
function confirmSubmit() {
  // In production this would POST to a backend or update picks.json via GitHub API
  // For now, store in localStorage as pending
  const cw = getCurrentWeek();
  const key = `dgpt_picks_w${cw?.week}_${currentUser}`;
  localStorage.setItem(key, JSON.stringify({ draft8: draft8.map(p=>p.name), forced6: forced6.map(p=>p.name), submitted_at: new Date().toISOString() }));
  // Update local data state
  if(cw && data.picks) {
    const weekData = data.picks.weeks.find(w=>w.week===cw.week);
    if(weekData) { weekData[currentUser].submitted = true; weekData[currentUser].draft8 = draft8.map(p=>p.name); weekData[currentUser].forced6 = forced6.map(p=>p.name); }
  }
  document.getElementById('submit-content').innerHTML = `
    <div class="success-wrap">
      <div class="success-icon">🎯</div>
      <div class="success-title" style="color:${currentUser==='leo'?'var(--leo)':'var(--joe)'}">${currentUser==='leo'?'Leo':'Joe'}'s Picks Locked!</div>
      <div class="success-sub">Your Week ${cw?.week} rankings are saved.<br>${currentUser==='leo'?'Joe':'Leo'} still needs to submit theirs.</div>
      <button class="btn" onclick="cancelSubmit()" style="max-width:200px;margin:0 auto;">Back to Draft</button>
    </div>`;
}

// ══ STANDINGS ══
function renderStandings() {
  const el = document.getElementById('view-standings');
  const standings = data.standings?.standings || [];
  const cw = getCurrentWeek();
  const picks = allPicksForWeek(cw?.week);
  const banned = standings.filter(p=>p.banned);
  const active = standings.filter(p=>!p.banned);
  const all = [...banned, ...active];
  el.innerHTML = `
    <div class="section-label">DGPT MPO Standings</div>
    <div style="padding:0;">
      ${all.map((p,i)=>{
        const isBan = p.banned;
        const displayRank = isBan ? '—' : p.rank;
        const isTop = !isBan && p.rank<=3;
        const isTop10 = !isBan && p.rank<=10;
        const leoP = picks.leo.includes(p.name);
        const joeP = picks.joe.includes(p.name);
        return `<div class="st-row">
          <div class="st-rank ${isTop?'top':''}">${displayRank}</div>
          <div class="st-avatar" style="background:${isBan?'var(--red-dim)':'rgba(255,255,255,0.06)'};color:${isBan?'var(--red)':'var(--muted)'};">${p.initials}</div>
          <div class="st-info">
            <div class="st-name">
              ${p.name}
              ${isBan?'<span class="banned-tag">BANNED</span>':''}
              ${isTop10&&!isBan?'<span class="top10-tag">Top 10</span>':''}
              ${leoP?'<span style="background:var(--green-dim);color:var(--leo);font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;font-family:\'Barlow Condensed\',sans-serif;">Leo</span>':''}
              ${joeP?'<span style="background:var(--orange-dim);color:var(--joe);font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;font-family:\'Barlow Condensed\',sans-serif;">Joe</span>':''}
            </div>
            <div class="st-sub">${p.sponsor||''} ${isBan?'· Banned — too dominant':p.wins>0?'· '+p.wins+' win'+(p.wins>1?'s':''):''}</div>
          </div>
          <div class="st-pts" style="color:${isBan?'var(--muted)':'var(--text)'}">${isBan?'—':p.pts?.toLocaleString()}</div>
        </div>`;
      }).join('')}
    </div>`;
}

// ══ RULES ══
function renderRules() {
  document.getElementById('view-rules').innerHTML = `
    <div class="rules-card">
      <div class="rules-title" style="color:var(--orange);">How It Works</div>
      <div class="rules-body">Each week, Leo and Joe each <strong>rank ${GAME.draft_picks} MPO players</strong> as their draft pool. The app resolves picks in snake draft order — whoever went second last week goes first this week. Your top available player gets drafted to your team.<br><br>Each player also <strong>ranks ${GAME.forced_picks} top-10 DGPT players</strong> to assign to their opponent. The opponent's highest-ranked available player is forced onto their roster.<br><br>Draft submissions open <strong>Monday</strong> and close <strong>Wednesday at midnight</strong> each tournament week.</div>
    </div>
    <div class="rules-card">
      <div class="rules-title">Scoring</div>
      <div class="rules-body">Each week is worth <strong>${GAME.pts_per_week} points</strong>. If one of your 3 players wins the tournament outright, you collect the points. If no pick wins, the week pushes and <strong>points roll over</strong> to the following week, adding to the next week's pot.</div>
    </div>
    <div class="rules-card">
      <div class="rules-title">Snake Draft Order</div>
      <div class="rules-body">Week 1: Joe picks first. The order <strong>flips every week</strong> — whoever went first last week goes second next week.</div>
    </div>
    <div class="rules-card" style="background:var(--red-dim);border-color:rgba(240,69,69,0.2);">
      <div class="rules-title" style="color:var(--red);">Banned Players</div>
      <div class="rules-body">
        <div style="display:flex;align-items:center;gap:10px;margin-top:4px;">
          <div class="st-avatar" style="background:var(--red-dim);color:var(--red);">GB</div>
          <div><div style="font-size:14px;font-weight:600;color:var(--text);">Gannon Buhr</div><div style="font-size:12px;color:var(--muted);">Too dominant. Won weeks 2 & 3. Banned permanently.</div></div>
        </div>
      </div>
    </div>`;
}

// ══ UTILS ══
function formatDateRange(start, end) {
  const s = new Date(start+'T12:00:00'), e = new Date(end+'T12:00:00');
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${months[s.getMonth()]} ${s.getDate()}–${e.getDate()}, ${s.getFullYear()}`;
}

// ══ INIT ══
const saved = localStorage.getItem('dgpt_user');
if(saved && PINS[saved]) { currentUser=saved; showApp(); }
else { document.getElementById('login-screen').style.display='flex'; }
</script>
